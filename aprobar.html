<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aprobar informe · Sealcode</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#0f0f0f;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#1a1a1a;border-radius:16px;max-width:460px;width:100%;overflow:hidden;border:1px solid #2a2a2a}
  .hdr{background:#E8640A;padding:22px 24px;display:flex;align-items:center;gap:14px}
  .logo{background:#fff;border-radius:6px;padding:5px 10px;flex-shrink:0}
  .logo-t{color:#E8640A;font-size:15px;font-weight:700;line-height:1.2}
  .logo-s{color:#E8640A;font-size:6px;letter-spacing:2px;text-align:center}
  .hdr-txt h1{color:#fff;font-size:15px;font-weight:600;margin-bottom:2px}
  .hdr-txt p{color:rgba(255,255,255,.75);font-size:12px}
  .body{padding:28px}
  .label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.7px;font-weight:500;margin-bottom:8px}
  .input-wrap{position:relative;margin-bottom:20px}
  .prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#555;font-size:15px;font-weight:500;pointer-events:none}
  input[type=text]{width:100%;background:#252525;border:1.5px solid #333;border-radius:8px;padding:12px 14px 12px 28px;font-size:15px;color:#eee;outline:none;transition:border .2s}
  input[type=text]::placeholder{color:#444}
  input[type=text]:focus{border-color:#E8640A}
  .nota{background:#1f1208;border:1px solid #4a2800;border-radius:8px;padding:12px 14px;margin-bottom:22px}
  .nota p{font-size:12px;color:#d4854a;line-height:1.65}
  input[type=submit]{width:100%;background:#E8640A;color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.3px}
  input[type=submit]:hover{background:#d4560a}
  input[type=submit]:active{transform:scale(.98)}
  .ftr{padding:16px 24px;border-top:1px solid #222;display:flex;justify-content:space-between;align-items:center}
  .ftr span{font-size:11px;color:#444}
  .ftr a{font-size:11px;color:#E8640A;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <div class="logo">
      <div class="logo-t">SEAL<span style="color:#1a1a1a">CODE</span></div>
      <div class="logo-s">CODIFICACIÓN INK JET</div>
    </div>
    <div class="hdr-txt">
      <h1>Aprobar informe para presupuesto</h1>
      <p>Revisión interna · Sealcode Argentina</p>
    </div>
  </div>
  <div class="body">
    <form action="https://hook.us2.make.com/apqpua1cwgfprmkjm4iy21uhpbqfa3pi" method="GET" target="_blank">
      <div class="label">Número de informe</div>
      <div class="input-wrap">
        <span class="prefix">#</span>
        <input type="text" name="numero" placeholder="Ej: 12418" autocomplete="off" required>
      </div>
      <div class="nota">
        <p>Solo aprobar informes que ya fueron revisados. Una vez enviado, el sistema generará y enviará el presupuesto automáticamente al cliente.</p>
      </div>
      <input type="submit" value="Enviar a presupuesto">
    </form>
  </div>
  <div class="ftr">
    <span>Sealcode Argentina S.A.</span>
    <a href="https://www.sealcode.com" target="_blank">sealcode.com</a>
  </div>
</div>
</body>
</html>
